; ClearStream Integration Examples for Asterisk
; ============================================================
; Copy the relevant context(s) into your /etc/asterisk/extensions.conf,
; or include this file with: #include /etc/asterisk/clearstream.conf
;
; Pattern 1: EAGI  — real-time noise suppression on a live call leg.
; Pattern 2: Record → enhance → playback (e.g. voicemail cleanup demo).
; Pattern 3: ARI bridge (clearstream-app Stasis application).
; ============================================================

[clearstream-demo]

; ── Pattern 1: EAGI — real-time noise suppression ────────────────────────────
; The clearstream-agi binary reads raw PCM on fd 3, suppresses noise via
; ClearStream, and writes clean PCM back to stdout.
;
; Build and install the binary first:
;   cd /path/to/clearstream
;   go build -o /usr/local/bin/clearstream-agi ./examples/asterisk/agi_handler.go
;   chmod +x /usr/local/bin/clearstream-agi
;
; Call flow: dial 1000 → answer → EAGI runs ClearStream → hangup.
exten => 1000,1,NoOp(ClearStream Pattern 1: EAGI live noise suppression)
exten => 1000,n,Answer()
exten => 1000,n,EAGI(/usr/local/bin/clearstream-agi)
exten => 1000,n,Hangup()

; ── Pattern 2: Record → enhance → playback ───────────────────────────────────
; Records the caller for up to 60 seconds (with 5 s max silence), then posts
; the WAV to ClearStream /enhance via curl, and plays back the clean file.
;
; Requirements:
;   - ClearStream HTTP server running on clearstream:8080
;     (start with: clearstream --listen :8080)
;   - curl available on the Asterisk host
;   - /tmp writable by the asterisk user
;
; Note: curl is called via System() which blocks the dialplan.  For production
; use AGI or ARI to avoid blocking the channel thread.
exten => 1001,1,NoOp(ClearStream Pattern 2: record + enhance + playback)
exten => 1001,n,Answer()
exten => 1001,n,Record(/tmp/call-${UNIQUEID}.wav,5,60,k)
exten => 1001,n,System(curl -sf -X POST http://clearstream:8080/enhance \
    -F audio=@/tmp/call-${UNIQUEID}.wav \
    -o /tmp/clean-${UNIQUEID}.wav)
exten => 1001,n,GotoIf($[${SYSTEMSTATUS} = SUCCESS]?play)
exten => 1001,n,Playback(/tmp/call-${UNIQUEID})
exten => 1001,n,Goto(done)
exten => 1001,n(play),Playback(/tmp/clean-${UNIQUEID})
exten => 1001,n(done),Hangup()

; ── Pattern 3: ARI bridge ────────────────────────────────────────────────────
; Routes the call into the Stasis application managed by ari_bridge.go.
; Start the bridge before the call arrives:
;
;   go run ./examples/asterisk/ari_bridge.go \
;       --asterisk http://localhost:8088 \
;       --ari-user asterisk --ari-pass asterisk \
;       --clearstream http://localhost:8080 \
;       --app clearstream-app
;
; ARI must be enabled in /etc/asterisk/ari.conf (see ari_bridge.go header).
exten => 1002,1,NoOp(ClearStream Pattern 3: ARI bridge)
exten => 1002,n,Answer()
exten => 1002,n,Stasis(clearstream-app)
exten => 1002,n,Hangup()

; ── Catch-all for the demo context ───────────────────────────────────────────
exten => i,1,NoOp(Invalid extension in clearstream-demo)
exten => i,n,Hangup()

; ── Routing from your main context ───────────────────────────────────────────
; Add a Goto from your [default] or [from-trunk] context, e.g.:
;
;   exten => _100X,1,Goto(clearstream-demo,${EXTEN},1)
