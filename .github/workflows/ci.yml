name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Download dependencies
        run: CGO_ENABLED=0 go mod download

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Test
        run: CGO_ENABLED=0 go test -timeout 120s ./...

      - name: Race detector
        # race detector requires CGO; exclude packages with no tests to keep this fast
        run: |
          go test -race -timeout 120s \
            ./pkg/audio/... \
            ./pkg/model/... \
            ./pkg/file/... \
            ./pkg/http/... \
            ./pkg/sip/... \
            ./pkg/websocket/...
