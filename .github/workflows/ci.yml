name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg librnnoise-dev

      - name: Download Go modules
        run: go mod download

      - name: Build (CGO disabled — no external libs needed)
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Test (CGO disabled)
        run: CGO_ENABLED=0 go test -timeout 120s -count=1 ./...

      - name: Test with race detector (CGO enabled, librnnoise present)
        run: |
          go test -race -timeout 120s -count=1 \
            ./pkg/audio/... \
            ./pkg/file/... \
            ./pkg/http/... \
            ./pkg/sip/... \
            ./pkg/websocket/...

      - name: Build with CGO (RNNoise enabled)
        run: go build ./...
