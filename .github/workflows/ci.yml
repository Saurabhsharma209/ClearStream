name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      matrix:
        go-version: ["1.21", "1.22"]

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5.5.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          # librnnoise-dev is optional; rnnoise support requires -tags rnnoise
          sudo apt-get install -y librnnoise-dev || echo "librnnoise-dev unavailable – building without RNNoise CGo support"

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 -timeout=120s ./...

      - name: Race condition check
        run: go test -race -count=1 -timeout=120s ./pkg/... .

      - name: Coverage report
        run: |
          go test -coverprofile=coverage.out -covermode=atomic \
            $(go list ./... | grep -v 'examples\|tools\|cmd') 2>/dev/null || true
          TOTAL=$(go tool cover -func=coverage.out 2>/dev/null | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Core package coverage: ${TOTAL}%"
          # Fail if coverage drops below 80% on core packages
          awk "BEGIN{exit (${TOTAL:-0} < 80)}" || (echo "Coverage ${TOTAL}% below 80% threshold" && exit 1)
        continue-on-error: false

      - name: Benchmark (smoke)
        run: go test -run='^$$' -bench=. -benchtime=1x ./...

  release:
    name: Release Binaries
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5.5.0
        with:
          go-version: "1.22"

      - name: Build multi-arch binaries
        run: |
          mkdir -p dist
          for GOOS in linux darwin; do
            for GOARCH in amd64 arm64; do
              out="dist/clearstream-${GOOS}-${GOARCH}"
              GOOS=$GOOS GOARCH=$GOARCH go build -o "$out" ./cmd/clearstream/ && echo "Built $out"
            done
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
