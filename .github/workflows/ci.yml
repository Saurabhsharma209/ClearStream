name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install RNNoise
        run: sudo apt-get install -y librnnoise-dev || true

      - name: Build
        run: go build ./...

      - name: Build without CGo
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (no CGo, no external deps)
        run: CGO_ENABLED=0 go test ./...

      - name: Test with race detector
        run: CGO_ENABLED=0 go test -race ./...
