name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.5.0
        with:
          go-version: "1.22"
          cache: true

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Download dependencies
        run: go mod download

      - name: Verify go.sum is complete
        run: go mod verify

      - name: Build (CGo disabled)
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        run: CGO_ENABLED=0 go vet ./...

      - name: Test (CGo disabled, no external deps)
        run: CGO_ENABLED=0 go test -timeout 120s ./...

      - name: Test with race detector
        run: CGO_ENABLED=0 go test -race -timeout 120s ./...
