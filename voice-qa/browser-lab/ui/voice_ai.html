<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ClearStream Lab — Voice AI playback</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 32px auto; padding: 0 16px; }
  pre { background: #f5f5f5; padding: 8px; font-size: 13px; min-height: 120px; }
</style>
</head>
<body>
<h2>Voice AI (STT / LLM / TTS status)</h2>
<p>Subscribes to orchestrator events. TTS audio plays when the orchestrator sends binary PCM.</p>
<label>Events URL <input id="eventsUrl" size="48" value="ws://localhost:8090/events"></label>
<button id="btnConnect">Connect</button>
<pre id="log"></pre>
<script>
const SAMPLE_RATE = 16000;
let ws, audioCtx, playAt = 0, queue = [];

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function drain() {
  if (!audioCtx || queue.length === 0) return;
  const now = audioCtx.currentTime;
  if (playAt < now) playAt = now + 0.05;
  while (queue.length) {
    const f32 = queue.shift();
    const buf = audioCtx.createBuffer(1, f32.length, SAMPLE_RATE);
    buf.copyToChannel(f32, 0);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(playAt);
    playAt += buf.duration;
  }
}

document.getElementById('btnConnect').onclick = () => {
  ws = new WebSocket(document.getElementById('eventsUrl').value);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => {
    log('connected');
    audioCtx = new AudioContext({ sampleRate: SAMPLE_RATE });
  };
  ws.onmessage = e => {
    if (typeof e.data === 'string') {
      try {
        const j = JSON.parse(e.data);
        log(JSON.stringify(j));
      } catch { log(e.data); }
      return;
    }
    const i16 = new Int16Array(e.data);
    const f32 = new Float32Array(i16.length);
    for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
    queue.push(f32);
    drain();
  };
};
</script>
</body>
</html>
